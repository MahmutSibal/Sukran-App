name: sukran_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  flutter_secure_storage: ^9.2.4
  go_router: ^14.8.1
  http: ^1.2.2
  intl: ^0.20.2
  geolocator: ^13.0.2
  mobile_scanner: ^5.2.3
  shared_preferences: ^2.3.4
  signalr_netcore: ^1.3.7
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  url_launcher: ^6.3.1
  camera: ^0.12.0+1
  share_plus: ^12.0.2
  path_provider: ^2.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/branding/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/branding/icon_1024.png"
  adaptive_icon_background: "#103D24"
  adaptive_icon_foreground: "assets/branding/icon_foreground.png"

flutter_native_splash:
  color: "#103D24"
  image: assets/branding/splash_logo.png
  android_12:
    color: "#103D24"
    image: assets/branding/splash_logo.png
  android: true
  ios: false
  web: false
